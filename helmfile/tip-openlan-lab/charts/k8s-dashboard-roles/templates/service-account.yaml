apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-dashboard-kubernetes-dashboard
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: k8s-dashboard-kubernetes-dashboard-token
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/service-account.name: k8s-dashboard-kubernetes-dashboard
type: kubernetes.io/service-account-token
